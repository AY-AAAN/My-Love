<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Most Beloved</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="envelope-screen">
    <div class="envelope" onclick="openEnvelope()">
        <div class="letter-inside">Click to Open</div>
    </div>
</div>

<div id="main-content" style="display:none; opacity: 0;">
    <div class="container">
        <h1 class="title">To My Most Beloved</h1>
        <p class="typewriter" data-text="My dearest Honey, I offer thine humble creation, written as though beneath candlelight in an age long past..."></p>

        <div class="buttons">
            <a href="letters.html">My Letters</a>
            <a href="songs.html">Songs of My Heart</a>
        </div>

        <div class="password-box parchment">
            <p>Enter the sacred word:</p>
            <p style="font-size: 0.8rem; color: #6b527e;">(Hint: The day you said yes — MMDDYY)</p>
            <input type="password" id="passwordInput" placeholder="021026">
            <button onclick="checkPassword()">Unlock</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
